<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recurring Task Manager</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="app-shell">
    <main class="container app-container">
      <header class="hero">
        <div>
          <p class="eyebrow">Dashboard</p>
          <h1>Recurring Task Manager</h1>
          <p class="subtitle">Manage recurring habits and keep your progress synced.</p>
        </div>
        <div class="hero-actions">
          <p id="user-email" class="user-pill"></p>
          <button id="logout-btn" type="button" class="secondary-btn">Log out</button>
        </div>
      </header>

      <section class="card">
        <h2>Add Task</h2>
        <form id="task-form" class="task-form">
          <label>
            Task name
            <input id="task-name" type="text" placeholder="Drink water" required />
          </label>

          <label>
            Repeat every
            <div class="inline-fields">
              <input id="task-interval" type="number" min="1" value="1" required />
              <select id="task-unit">
                <option value="once">One-time</option>
                <option value="day">Day(s)</option>
                <option value="week">Week(s)</option>
                <option value="month">Month(s)</option>
              </select>
            </div>
          </label>

          <button type="submit">Add Task</button>
        </form>
      </section>

      <section class="card">
        <div class="section-header">
          <h2>Your Tasks</h2>
          <p id="task-count" class="muted-text"></p>
        </div>
        <p id="app-status" class="status-text"></p>
        <p id="empty-state">No recurring tasks yet. Add one above.</p>
        <ul id="task-list" class="task-list"></ul>
      </section>
    </main>

    <template id="task-item-template">
      <li class="task-item">
        <div class="task-item-main">
          <h3 class="task-title"></h3>
          <p class="task-meta"></p>
          <p class="task-next"></p>
        </div>
        <div class="task-item-actions">
          <button class="complete-btn" type="button">Mark complete</button>
          <button class="delete-btn" type="button">Delete</button>
        </div>
      </li>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
  </body>
</html>
